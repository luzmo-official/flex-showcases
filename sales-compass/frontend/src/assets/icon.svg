<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Main gradient from teal to blue -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgb(0,57,59)"/>
      <stop offset="100%" stop-color="rgb(0,57,59)"/>
    </linearGradient>
    
    <!-- Dark background gradient -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgb(255, 255, 255)"/>
      <stop offset="100%" stop-color="#rgb(200, 200, 200)"/>
    </linearGradient>
    
    <!-- Subtle inner shadow -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Dark circular background -->
  <circle cx="16" cy="16" r="15" fill="url(#darkGradient)" stroke="rgb(202, 202, 202)" stroke-width="0.5"/>
  
  <!-- Compass design -->
  <g filter="url(#innerShadow)">
    <!-- Outer compass ring -->
    <circle cx="16" cy="16" r="12" fill="none" stroke="url(#mainGradient)" stroke-width="2"/>
    
    <!-- North, East, South, West markers -->
    <line x1="16" y1="6" x2="16" y2="9" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="26" y1="16" x2="23" y2="16" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="26" x2="16" y2="23" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="9" y2="16" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    
    <!-- Compass needle -->
    <path d="M16,16 L20,8 L16,12 L12,8 Z" fill="url(#mainGradient)"/>
    <path d="M16,16 L12,24 L16,20 L20,24 Z" fill="white" opacity="0.8"/>
    
    <!-- Center dot -->
    <circle cx="16" cy="16" r="2" fill="white"/>
    
    <!-- Growth arrow -->
    <path d="M22,13 L25,10 L25,14 Z" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#mainGradient)" stroke-width="0.5" opacity="0.3"/>
</svg>