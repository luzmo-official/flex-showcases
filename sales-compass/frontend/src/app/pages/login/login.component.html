<div class="min-h-screen bg-surface flex flex-col items-center justify-center px-8 py-6">
  <div class="max-w-6xl w-full flex-grow flex flex-col justify-center">
    <div class="flex flex-col items-center mb-16 md:mb-24">
      <div class="flex items-center gap-3 mb-2">
        <img
          alt="Sales Compass Logo"
          class="w-12 h-12"
          src="assets/icon.svg"
        />
        <span class="text-3xl font-medium text-active">Sales Compass</span>
      </div>
      <a
        href="https://luzmo.com/"
        target="_blank"
        class="flex items-center justify-center gap-2 text-dimmed hover:text-default interactive text-lg"
      >
        <span>Built with</span>
        <img
          src="assets/logos/logo-small.svg"
          alt="Luzmo"
          class="w-4 h-4"
        />
        <span>Luzmo</span>
      </a>
    </div>

    <h1 class="text-center uppercase mb-6">Select a user profile</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 user-card-container">
      @for (user of users; track user.name) {
        <div
          class="user-card bg-surface-raised flex flex-col items-center p-4 md:p-6 cursor-pointer transition-all duration-300 border border-default rounded-lg hover:border-hard disabled:opacity-50 disabled:cursor-not-allowed"
          [class.disabled]="isLoggingIn && selectedUser !== user"
          [class.selected]="isLoggingIn && selectedUser === user"
          (click)="login(user)"
        >
          <div
            class="avatar-container w-24 h-24 md:w-32 md:h-32 mb-4 md:mb-6 relative"
            [class.loading]="isLoggingIn && selectedUser === user"
          >
            <div
              class="w-full h-full rounded-full overflow-hidden flex items-center justify-center border border-2 border-secondary avatar-inner"
            >
              @if (user.imageUrl) {
                <img
                  alt="{{ user.name }}"
                  class="w-full h-full object-cover"
                  [src]="user.imageUrl"
                />
              } @else {
                <span class="text-3xl text-secondary-inverse">{{ user.initials }}</span>
              }
            </div>
          </div>
          <div class="flex items-center gap-3 mb-2">
            <h2 class="text-lg font-medium text-center mb-0">
              {{ user.name }}
            </h2>
          </div>
          @if (isLoggingIn && selectedUser === user) {
            <div class="text-secondary text-xs font-medium animate-pulse">Signing in...</div>
          } @else {
            <p class="text-dimmed text-sm text-center">{{ user.title }}</p>
          }
        </div>
      }
    </div>
  </div>
</div>
