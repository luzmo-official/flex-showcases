<div class="data-panel-content">

    [authToken]="authToken"
    [datasetIds]="datasetIds"
    [datasetPicker]="true"
    [search]="'on'"

    (luzmo-dataset-changed)="onDatasetChanged($event)"
  >
  </luzmo-data-field-panel>
</div>
