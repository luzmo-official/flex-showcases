<mat-tab-group [dynamicHeight]='true'>
  <mat-tab label="Data slots">
    <app-chart-config-panel
      [authKey]="authKey"
      [authToken]="authToken"
    ></app-chart-config-panel>
  </mat-tab>
  <mat-tab label="Options">
    <app-chart-settings
      [authKey]="authKey"
      [authToken]="authToken"
    ></app-chart-settings>
  </mat-tab>
  <mat-tab label="Filters ({{ filterCount() }})">
    <app-filters-panel
      [authKey]="authKey"
      [authToken]="authToken"
      [datasetIds]="datasetIds"
    ></app-filters-panel>
  </mat-tab>
</mat-tab-group>
