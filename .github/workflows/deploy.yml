name: "Build and Deploy"
on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed showcases
    runs-on: ubuntu-latest
    outputs:
      dashboard_filter_panel: ${{ steps.filter.outputs.dashboard_filter_panel }}
      report_builder: ${{ steps.filter.outputs.report_builder }}
      wearables_dashboard: ${{ steps.filter.outputs.wearables_dashboard }}
      newspaper: ${{ steps.filter.outputs.newspaper }}
      dashboard_to_flex_grid: ${{ steps.filter.outputs.dashboard_to_flex_grid }}
      fifa2026: ${{ steps.filter.outputs.fifa2026 }}
      the_constructor: ${{ steps.filter.outputs.the_constructor }}
      devops_command: ${{ steps.filter.outputs.devops_command }}
      euro2024: ${{ steps.filter.outputs.euro2024 }}
      cfo_cockpit: ${{ steps.filter.outputs.cfo_cockpit }}
      block_type_editor: ${{ steps.filter.outputs.block_type_editor }}
      guided_chart_creator: ${{ steps.filter.outputs.guided_chart_creator }}
      flexcalidraw: ${{ steps.filter.outputs.flexcalidraw }}
      ack_maps_builder: ${{ steps.filter.outputs.ack_maps_builder }}
      sustain_iq: ${{ steps.filter.outputs.sustain_iq }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflow:
              - '.github/workflows/deploy.yml'
            dashboard_filter_panel:
              - 'dashboard-filter-panel/**'
            report_builder:
              - 'report-builder/**'
            wearables_dashboard:
              - 'wearables-dashboard/**'
            newspaper:
              - 'newspaper/**'
            dashboard_to_flex_grid:
              - 'dashboard-to-flex-grid/**'
            fifa2026:
              - 'fifa2026/**'
            the_constructor:
              - 'the-constructor/**'
            devops_command:
              - 'devops-command/**'
            euro2024:
              - 'euro2024/**'
            cfo_cockpit:
              - 'cfo-cockpit/**'
            block_type_editor:
              - 'block-type-editor/**'
            guided_chart_creator:
              - 'guided-chart-creator/**'
            flexcalidraw:
              - 'flexcalidraw/**'
            ack_maps_builder:
              - 'ack-maps-builder/**'
            sustain_iq:
              - 'sustain-iq/**'

  Build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard-filter-panel
            changed: ${{ needs.changes.outputs.dashboard_filter_panel }}
            outputFolder: dist/dashboard-filter-panel/browser/
          - name: report-builder
            changed: ${{ needs.changes.outputs.report_builder }}
            outputFolder: dist/report-builder/browser/
          - name: wearables-dashboard
            changed: ${{ needs.changes.outputs.wearables_dashboard }}
            outputFolder: dist/
          - name: newspaper
            changed: ${{ needs.changes.outputs.newspaper }}
            outputFolder: dist/newspaper/browser/
          - name: dashboard-to-flex-grid
            changed: ${{ needs.changes.outputs.dashboard_to_flex_grid }}
            outputFolder: dist/
          - name: fifa2026
            changed: ${{ needs.changes.outputs.fifa2026 }}
            outputFolder: dist/
          - name: the-constructor
            changed: ${{ needs.changes.outputs.the_constructor }}
            outputFolder: dist/
          - name: devops-command
            changed: ${{ needs.changes.outputs.devops_command }}
            outputFolder: frontend/dist/devops-command/browser/
          - name: euro2024
            changed: ${{ needs.changes.outputs.euro2024 }}
            outputFolder: dist/euro2024-showcase/browser/
          - name: cfo-cockpit
            changed: ${{ needs.changes.outputs.cfo_cockpit }}
            outputFolder: dist/cfo-angular-product/browser/
          - name: block-type-editor
            changed: ${{ needs.changes.outputs.block_type_editor }}
            outputFolder: dist/
          - name: guided-chart-creator
            changed: ${{ needs.changes.outputs.guided_chart_creator }}
            outputFolder: out/
          - name: flexcalidraw
            changed: ${{ needs.changes.outputs.flexcalidraw }}
            outputFolder: excalidraw-app/build/
          - name: ack-maps-builder
            changed: ${{ needs.changes.outputs.ack_maps_builder }}
            outputFolder: dist/
          - name: sustain-iq
            changed: ${{ needs.changes.outputs.sustain_iq }}
            outputFolder: dist/
    if: ${{ needs.changes.outputs.workflow == 'true' || matrix.changed == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ${{ matrix.name }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/{1}', matrix.name, 'package-lock.json')) }}

      - name: Write fifa2026 .env
        if: matrix.name == 'fifa2026'
        working-directory: fifa2026
        run: |
          echo "VITE_LUZMO_EMBED_KEY=${{ secrets.FIFA2026_VITE_LUZMO_EMBED_KEY }}" > .env
          echo "VITE_LUZMO_EMBED_TOKEN=${{ secrets.FIFA2026_VITE_LUZMO_EMBED_TOKEN }}" >> .env
          echo "VITE_LUZMO_APP_SERVER=${{ secrets.FIFA2026_VITE_LUZMO_APP_SERVER }}" >> .env
          echo "VITE_LUZMO_API_HOST=${{ secrets.FIFA2026_VITE_LUZMO_API_HOST }}" >> .env
          echo "VITE_LUZMO_DATASET_GROUPS_ODDS=${{ secrets.FIFA2026_VITE_LUZMO_DATASET_GROUPS_ODDS }}" >> .env
          echo "VITE_LUZMO_DATASET_TEAM_PROFILES=${{ secrets.FIFA2026_VITE_LUZMO_DATASET_TEAM_PROFILES }}" >> .env
          echo "VITE_LUZMO_DATASET_HISTORICAL=${{ secrets.FIFA2026_VITE_LUZMO_DATASET_HISTORICAL }}" >> .env
          echo "VITE_LUZMO_COLUMN_TEAM=${{ secrets.FIFA2026_VITE_LUZMO_COLUMN_TEAM }}" >> .env
          echo "VITE_LUZMO_COLUMN_GROUP=${{ secrets.FIFA2026_VITE_LUZMO_COLUMN_GROUP }}" >> .env
          echo "VITE_LUZMO_COLUMN_TOURNAMENT_WIN_PROB=${{ secrets.FIFA2026_VITE_LUZMO_COLUMN_TOURNAMENT_WIN_PROB }}" >> .env
          echo "VITE_LUZMO_COLUMN_GROUP_ADVANCE_PROB=${{ secrets.FIFA2026_VITE_LUZMO_COLUMN_GROUP_ADVANCE_PROB }}" >> .env
          echo "VITE_LUZMO_COLUMN_GROUP_WIN_PROB=${{ secrets.FIFA2026_VITE_LUZMO_COLUMN_GROUP_WIN_PROB }}" >> .env
          echo "VITE_LUZMO_COLUMN_CONFEDERATION=${{ secrets.FIFA2026_VITE_LUZMO_COLUMN_CONFEDERATION }}" >> .env

      - name: Write ack-maps-builder .env
        if: matrix.name == 'ack-maps-builder'
        working-directory: ack-maps-builder
        run: |
          echo "VITE_LUZMO_AUTH_KEY=${{ secrets.ACK_MAPS_BUILDER_VITE_LUZMO_AUTH_KEY }}" > .env
          echo "VITE_LUZMO_AUTH_TOKEN=${{ secrets.ACK_MAPS_BUILDER_VITE_LUZMO_AUTH_TOKEN }}" >> .env
          echo "VITE_LUZMO_API_URL=${{ secrets.ACK_MAPS_BUILDER_VITE_LUZMO_API_URL }}" >> .env
          echo "VITE_LUZMO_APP_SERVER=${{ secrets.ACK_MAPS_BUILDER_VITE_LUZMO_APP_SERVER }}" >> .env

      - name: Write the-constructor .env
        if: matrix.name == 'the-constructor'
        working-directory: the-constructor
        run: |
          echo "VITE_LUZMO_EMBED_KEY=${{ secrets.CONSTRUCTOR_VITE_LUZMO_EMBED_KEY }}" > .env
          echo "VITE_LUZMO_EMBED_TOKEN=${{ secrets.CONSTRUCTOR_VITE_LUZMO_EMBED_TOKEN }}" >> .env

      - name: Write sustain-iq .env
        if: matrix.name == 'sustain-iq'
        working-directory: sustain-iq
        run: |
          echo "VITE_LUZMO_EMBED_KEY=${{ secrets.SUSTAIN_IQ_VITE_LUZMO_EMBED_KEY }}" > .env
          echo "VITE_LUZMO_EMBED_TOKEN=${{ secrets.SUSTAIN_IQ_VITE_LUZMO_EMBED_TOKEN }}" >> .env
          echo "VITE_LUZMO_DATASET_ID=${{ secrets.SUSTAIN_IQ_VITE_LUZMO_DATASET_ID }}" >> .env

      - name: Clone flexcalidraw repo
        if: matrix.name == 'flexcalidraw'
        run: |
          git clone https://github.com/luzmo-official/flexcalidraw.git flexcalidraw-build

      - name: Build flexcalidraw
        if: matrix.name == 'flexcalidraw'
        run: |
          cd flexcalidraw-build
          yarn install --frozen-lockfile
          # Disable TS checker to work around pre-existing type error in LayerUI.tsx
          sed -i 's/typescript: true/typescript: false/' excalidraw-app/vite.config.mts
          VITE_APP_DISABLE_SENTRY=true VITE_APP_ENABLE_ESLINT=false VITE_APP_WS_SERVER_URL=https://flexcalidraw.luzmo.com yarn --cwd ./excalidraw-app vite build --base=/flexcalidraw/

      - name: Build front end
        if: matrix.name != 'flexcalidraw'
        run: |
          cd ${{ matrix.name }}
          npm ci
          npm run build:ci

      - name: Copy Folder
        if: github.event_name != 'pull_request' && matrix.name != 'flexcalidraw'
        uses: keithweaver/aws-s3-github-action@v1.0.0
        with:
          command: cp
          source: ./${{ matrix.name }}/${{ matrix.outputFolder }}/
          destination: s3://examples.luzmo.com/${{ matrix.name }}/
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: eu-west-1
          flags: --recursive

      - name: Copy Folder (flexcalidraw)
        if: github.event_name != 'pull_request' && matrix.name == 'flexcalidraw'
        uses: keithweaver/aws-s3-github-action@v1.0.0
        with:
          command: cp
          source: ./flexcalidraw-build/${{ matrix.outputFolder }}/
          destination: s3://examples.luzmo.com/${{ matrix.name }}/
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: eu-west-1
          flags: --recursive

  Invalidate_Cloudfront:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: Build
    steps:
      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.EXAMPLES_CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Pause to let invalidation complete
        run: |
          sleep 180
