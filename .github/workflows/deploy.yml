name: "Build and Deploy"
on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard-filter-panel
            outputFolder: dist/dashboard-filter-panel/browser/
          - name: drag-n-drop-chart-library
            outputFolder: build/
          - name: report-builder
            outputFolder: dist/report-builder/browser/
          - name: wearables-dashboard
            outputFolder: dist/
          - name: react-chart-library
            outputFolder: dist/
          - name: react-luzmo-iq-playground
            outputFolder: dist/
          - name: newspaper
            outputFolder: dist/newspaper/browser/
          - name: dashboard-to-flex-grid
            outputFolder: dist/
          - name: fifa2026
            outputFolder: dist/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ${{ matrix.name }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/{1}', matrix.name, 'package-lock.json')) }}

      - name: Build front end
        env:
          VITE_LUZMO_EMBED_KEY: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_EMBED_KEY || '' }}
          VITE_LUZMO_EMBED_TOKEN: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_EMBED_TOKEN || '' }}
          VITE_LUZMO_APP_SERVER: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_APP_SERVER || '' }}
          VITE_LUZMO_API_HOST: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_API_HOST || '' }}
          VITE_LUZMO_DATASET_GROUPS_ODDS: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_DATASET_GROUPS_ODDS || '' }}
          VITE_LUZMO_DATASET_TEAM_PROFILES: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_DATASET_TEAM_PROFILES || '' }}
          VITE_LUZMO_DATASET_HISTORICAL: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_DATASET_HISTORICAL || '' }}
          VITE_LUZMO_COLUMN_TEAM: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_COLUMN_TEAM || '' }}
          VITE_LUZMO_COLUMN_GROUP: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_COLUMN_GROUP || '' }}
          VITE_LUZMO_COLUMN_TOURNAMENT_WIN_PROB: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_COLUMN_TOURNAMENT_WIN_PROB || '' }}
          VITE_LUZMO_COLUMN_GROUP_ADVANCE_PROB: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_COLUMN_GROUP_ADVANCE_PROB || '' }}
          VITE_LUZMO_COLUMN_GROUP_WIN_PROB: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_COLUMN_GROUP_WIN_PROB || '' }}
          VITE_LUZMO_COLUMN_CONFEDERATION: ${{ matrix.name == 'fifa2026' && secrets.FIFA2026_VITE_LUZMO_COLUMN_CONFEDERATION || '' }}
        run: |
          cd ${{ matrix.name }}
          npm ci
          npm run build:ci

      - name: Copy Folder
        uses: keithweaver/aws-s3-github-action@v1.0.0
        # if: github.event_name != 'pull_request'
        with:
          command: cp
          source: ./${{ matrix.name }}/${{ matrix.outputFolder }}/
          destination: s3://examples.luzmo.com/${{ matrix.name }}/
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: eu-west-1
          flags: --recursive

  Invalidate_Cloudfront:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: Build
    # if: github.event_name != 'pull_request'

    steps:
      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.EXAMPLES_CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Pause to let invalidation complete
        run: |
          sleep 180
